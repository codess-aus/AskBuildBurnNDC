name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Explicitly request the token permissions needed to push to gh-pages.
# Without this, the push step can fail with 403 Permission denied.
permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Checks out your repo so MkDocs can read mkdocs.yml and docs/ content.
      - uses: actions/checkout@v4

      # Sets up a modern Python runtime for MkDocs.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Installs Python dependencies (MkDocs and any plugins/themes).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Builds the static site into ./site by default.
      - name: Build MkDocs site
        run: mkdocs build

      # Publishes the generated ./site folder to the gh-pages branch.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
